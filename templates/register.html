<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="register-bg">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <!-- ✅ FIX: class dipindah ke form -->
    <form method="POST" class="card p-4 shadow fade-in" style="width: 360px;" id="formRegister">
        
        <h4 class="text-center mb-3 fw-bold">
            <i class="bi bi-person-plus"></i> Register
        </h4>

        <!-- USERNAME -->
        <div class="mb-2">
            <label class="form-label">Username</label>
            <input name="username" id="username" class="form-control" required>
        </div>

        <!-- PASSWORD -->
        <div class="mb-2">
            <label class="form-label">Password</label>
            <div class="input-group">
                <input type="password" name="password" id="password" class="form-control" required>
                <button type="button" class="btn btn-outline-secondary" id="togglePass">
                    <i class="bi bi-eye"></i>
                </button>
            </div>

            <!-- strength -->
            <div class="strength-bar mt-2">
                <div id="strengthFill" class="strength-fill bg-danger"></div>
            </div>
            <small id="strengthText" class="text-muted"></small>
        </div>

        <!-- CONFIRM -->
        <div class="mb-2">
            <label class="form-label">Konfirmasi Password</label>
            <input type="password" id="confirmPassword" class="form-control" required>
            <small id="matchText"></small>
        </div>

        <!-- DIVISI -->
        <div class="mb-3">
            <label class="form-label">Divisi</label>
            <select name="divisi" class="form-control" required>
                <option value="">-- Pilih Divisi --</option>
                <option>Marketing</option>
                <option>Operational</option>
                <option>Hostlive</option>
                <option>Creative</option>
                <option>Accounting</option>
                <option>IT Support</option>
                <option>HRD</option>
            </select>
        </div>

        <!-- BUTTON -->
        <button class="btn btn-success w-100 shadow-sm" id="btnSubmit">
            <i class="bi bi-check-circle"></i> Register
        </button>

        <!-- LINK -->
        <a href="/login" class="text-center mt-3 d-block">
            Sudah punya akun? Login
        </a>

    </form>

</div>

<script>
const pass = document.getElementById("password");
const confirmPass = document.getElementById("confirmPassword");
const matchText = document.getElementById("matchText");
const strengthFill = document.getElementById("strengthFill");
const strengthText = document.getElementById("strengthText");
const toggle = document.getElementById("togglePass");
const form = document.getElementById("formRegister");

toggle.addEventListener("click", () => {
    pass.type = pass.type === "password" ? "text" : "password";
});

pass.addEventListener("input", () => {
    const val = pass.value;
    let score = 0;

    if (val.length >= 6) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const widths = ["25%", "50%", "75%", "100%"];
    const colors = ["bg-danger", "bg-warning", "bg-info", "bg-success"];
    const texts = ["Lemah", "Lumayan", "Kuat", "Sangat Kuat"];

    if (score > 0) {
        strengthFill.style.width = widths[score-1];
        strengthFill.className = "strength-fill " + colors[score-1];
        strengthText.innerText = texts[score-1];
    } else {
        strengthFill.style.width = "0%";
        strengthText.innerText = "";
    }
});

confirmPass.addEventListener("input", () => {
    if (confirmPass.value !== pass.value) {
        matchText.innerText = "Password tidak sama";
        matchText.className = "text-danger";
    } else {
        matchText.innerText = "Password cocok";
        matchText.className = "text-success";
    }
});

form.addEventListener("submit", (e) => {
    if (confirmPass.value !== pass.value) {
        e.preventDefault();
        alert("Password tidak sama!");
    } else {
        document.getElementById("btnSubmit").innerText = "Loading...";
    }
});
</script>

</body>
</html>
