<h3>Approval Izin</h3>

<table class="table">
    <tr>
        <th>ID</th>
        <th>Jenis</th>
        <th>Aksi</th>
    </tr>

    {% for i in data %}
    <tr>
        <td>{{ i.id }}</td>
        <td>{{ i.jenis_izin }}</td>
        <td>
            <form action="/approve/{{ i.id }}" method="POST">
                <button class="btn btn-success">Approve</button>
            </form>

            <form action="/reject/{{ i.id }}" method="POST">
                <button class="btn btn-danger">Reject</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>
